<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    .article {
      max-width: 680px;
      margin: 0 auto;
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    /* 封面图 */
    .cover {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover-placeholder {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .cover-placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.5;
    }

    /* 文章头部 */
    .header {
      padding: 32px 32px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .title {
      font-family: 'Noto Serif SC', 'SimSun', serif;
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: #999;
    }

    .author {
      color: #57606f;
      font-weight: 500;
    }

    .meta-divider {
      width: 1px;
      height: 12px;
      background: #dfe6e9;
    }

    /* 文章正文 */
    .content {
      padding: 24px 32px 40px;
    }

    .paragraph {
      font-size: 15px;
      color: #333;
      line-height: 1.9;
      margin-bottom: 20px;
      text-align: justify;
    }

    .paragraph:first-child {
      text-indent: 2em;
    }

    .paragraph:empty {
      height: 20px;
    }

    /* 引用样式 */
    .quote {
      margin: 24px 0;
      padding: 16px 20px;
      background: #f8f9fa;
      border-left: 4px solid #57606f;
      border-radius: 0 8px 8px 0;
    }

    .quote p {
      font-size: 14px;
      color: #57606f;
      line-height: 1.8;
    }

    /* 文章底部 */
    .footer {
      padding: 24px 32px;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }

    .source {
      font-size: 12px;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .source-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .source-icon {
      width: 16px;
      height: 16px;
      opacity: 0.5;
    }

    .qr-placeholder {
      width: 60px;
      height: 60px;
      background: #f0f0f0;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ccc;
      font-size: 8px;
    }

    /* 分割线 */
    .divider {
      width: 40px;
      height: 2px;
      background: #dfe6e9;
      margin: 32px auto;
    }
  </style>
</head>
<body>
  <article class="article">
    <!-- 封面图 -->
    <div class="cover">
      {% if image_url %}
      <img src="{{ image_url }}" alt="文章封面">
      {% else %}
      <div class="cover-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>封面图片</span>
      </div>
      {% endif %}
    </div>

    <!-- 文章头部 -->
    <div class="header">
      <h1 class="title">{{ title }}</h1>
      <div class="meta">
        <span class="author">{{ author or 'AI 创作' }}</span>
        <span class="meta-divider"></span>
        <span>{{ date }}</span>
      </div>
    </div>

    <!-- 文章正文 -->
    <div class="content">
      {% for para in content.split('\n\n') %}
      {% if para.trim() %}
      <p class="paragraph">{{ para }}</p>
      {% endif %}
      {% endfor %}
    </div>

    <!-- 文章底部 -->
    <div class="footer">
      <div class="source">
        <div class="source-left">
          <svg class="source-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V9a2 2 0 012-2h2a2 2 0 012 2v9a2 2 0 01-2 2h-2z"/>
          </svg>
          <span>来源：{{ unit_name }}</span>
        </div>
        <div class="qr-placeholder">二维码</div>
      </div>
    </div>
  </article>
</body>
</html>
