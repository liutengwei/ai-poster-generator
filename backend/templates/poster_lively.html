<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff6b35;
      --secondary: #f7931e;
      --accent: #ffd23f;
      --purple: #9b5de5;
      --pink: #f15bb5;
      --teal: #00f5d4;
      --dark: #2d3436;
      --gray: #636e72;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .poster {
      width: 540px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow:
        0 25px 50px rgba(255, 107, 53, 0.25),
        0 10px 20px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      position: relative;
    }

    /* 顶部渐变条 */
    .top-bar {
      height: 8px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--purple), var(--pink));
    }

    /* 标签装饰 */
    .tag {
      position: absolute;
      top: 24px;
      right: 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
    }

    /* 图片区域 */
    .image-wrapper {
      margin: 24px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      height: 300px;
      background: linear-gradient(135deg, #ffeaa7, #fab1a0);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-placeholder {
      color: #b2bec3;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .image-placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.5;
    }

    /* 内容区域 */
    .content {
      padding: 0 32px 32px;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.4;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .body-text {
      font-size: 14px;
      color: var(--gray);
      line-height: 1.9;
      white-space: pre-wrap;
    }

    /* 底部装饰 */
    .footer {
      padding: 20px 32px;
      background: linear-gradient(135deg, #fff5f0, #fff9f5);
      border-top: 1px dashed rgba(255, 107, 53, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .unit-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--dark);
    }

    .date {
      font-size: 11px;
      color: #b2bec3;
    }

    /* 底部标签装饰 */
    .tags {
      display: flex;
      gap: 8px;
    }

    .tag-item {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 500;
    }

    .tag-item.orange {
      background: rgba(255, 107, 53, 0.1);
      color: var(--primary);
    }

    .tag-item.purple {
      background: rgba(155, 93, 229, 0.1);
      color: var(--purple);
    }

    .tag-item.teal {
      background: rgba(0, 245, 212, 0.1);
      color: #00b894;
    }

    /* 装饰性圆形 */
    .decoration {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
    }

    .decoration.circle-1 {
      width: 120px;
      height: 120px;
      background: var(--accent);
      top: -30px;
      right: -30px;
    }

    .decoration.circle-2 {
      width: 80px;
      height: 80px;
      background: var(--purple);
      bottom: 80px;
      left: -20px;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="top-bar"></div>
    <div class="decoration circle-1"></div>
    <div class="decoration circle-2"></div>

    <div class="tag">精彩活动</div>

    <div class="image-wrapper">
      {% if image_url %}
      <img src="{{ image_url }}" alt="活动配图">
      {% else %}
      <div class="image-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>配图区域</span>
      </div>
      {% endif %}
    </div>

    <div class="content">
      <h1 class="title">{{ title }}</h1>
      <p class="body-text">{{ content }}</p>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="unit-name">{{ unit_name }}</div>
        <div class="date">{{ date }}</div>
      </div>
      <div class="tags">
        <span class="tag-item orange">活动中</span>
        <span class="tag-item purple">精彩回顾</span>
        <span class="tag-item teal">限时优惠</span>
      </div>
    </div>
  </div>
</body>
</html>
